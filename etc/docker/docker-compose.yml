services:

  keycloak-db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - ../../target/postgresql/keycloak:/var/lib/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    depends_on:
      - keycloak-db
    ports:
      - "9443:8443"
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/tls.key
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/tls.crt
      KC_HOSTNAME: kc.mra.local
    volumes:
      - ../../target/keycloak:/opt/keycloak/data
      - ../../etc/certificate/mra.crt:/opt/keycloak/certs/tls.crt
      - ../../etc/certificate/mra.key:/opt/keycloak/certs/tls.key
    command:
      - start